<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign in · EduMarket</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500&amp;family=Source+Sans+3:wght@600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Plus+Jakarta+Sans:wght@100..900&amp;family=Source+Sans+3:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        background: "#f7f9ff", on-error: "#ffffff", on-background: "#181c20",
        surface-tint: "#255dad", inverse-primary: "#abc7ff",
        surface-container-high: "#e5e8ee", secondary: "#3b6934",
        surface-container-lowest: "#ffffff", tertiary: "#661a00",
        primary-container: "#004a99", secondary-fixed-dim: "#a1d494",
        surface-container-highest: "#dfe3e9", outline-variant: "#c2c6d3",
        on-primary: "#ffffff", surface-container-low: "#f1f4fa",
        tertiary-fixed-dim: "#ffb59e", on-surface: "#181c20", primary: "#00346f",
        tertiary-fixed: "#ffdbd0", inverse-surface: "#2d3135",
        on-primary-fixed-variant: "#00458f", primary-fixed: "#d7e2ff",
        inverse-on-surface: "#eef1f7", error: "#ba1a1a", surface-bright: "#f7f9ff",
        surface-variant: "#dfe3e9", on-secondary: "#ffffff", on-tertiary: "#ffffff",
        error-container: "#ffdad6", on-tertiary-container: "#ffa68a",
        on-secondary-fixed: "#002201", on-primary-fixed: "#001b3f",
        on-secondary-fixed-variant: "#23501e", secondary-container: "#b9eeab",
        on-tertiary-fixed: "#ffdbd0", surface: "#f7f9ff",
        surface-container: "#ebeef4", on-surface-variant: "#424751",
        primary-fixed-dim: "#abc7ff", outline: "#737783",
        secondary-fixed: "#bcf0ae", on-secondary-container: "#3f6d38",
        on-primary-container: "#9bbdff", verified: "#0369A1", success: "#15803D"
      },
      fontFamily: {
        headline: ['"Plus Jakarta Sans"','Inter','sans-serif'],
        body: ['Inter','"Source Sans 3"','sans-serif'],
        label: ['"Source Sans 3"','monospace']
      },
      borderRadius: { lg: "0.5rem", xl: "0.75rem", full: "9999px" },
      spacing: {
        "container-max": "1280px", gutter: "24px",
        "margin-desktop": "40px", "margin-mobile": "16px",
        "section-gap": "80px", "stack-sm": "8px", "stack-md": "16px", "stack-lg": "32px"
      }
    }
  }
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
  .field { background:#F1F5F9; border:1px solid transparent; border-radius:4px; }
  .field:focus { outline:none; border:2px solid #00346f; background:#fff; }
</style>
</head>
<body class="bg-surface text-on-surface font-body">
<header class="sticky top-0 z-50 w-full bg-gradient-to-b from-surface to-surface-container-low border-b border-outline-variant shadow-sm">
  <div class="max-w-container-max mx-auto px-margin-desktop h-20 flex justify-between items-center">
    <a href="index.html" class="font-headline font-bold text-xl text-primary flex items-center gap-2"><span class="material-symbols-outlined text-tertiary">school</span> EduMarket</a>
    <a href="post-hiring-request.html" class="bg-tertiary text-on-tertiary px-5 py-2.5 rounded-full font-label font-semibold hover:opacity-90 transition active:scale-95">Request Shortlist</a>
  </div>
</header>
<div class="min-h-screen grid lg:grid-cols-2">
  <!-- Brand panel -->
  <div class="hidden lg:flex flex-col justify-between bg-primary text-on-primary p-12">
    <a href="index.html" class="flex items-center gap-2 font-headline font-bold text-2xl">
      <span class="material-symbols-outlined">school</span> EduMarket
    </a>
    <div>
      <h1 class="font-headline font-bold text-4xl leading-tight">The high-trust marketplace for Kenyan educators.</h1>
      <p class="mt-4 text-primary-fixed/90 max-w-md">Verified teachers, transparent salaries, and a guided hiring flow for schools across Kenya.</p>
    </div>
    <p class="text-primary-fixed/70 text-sm">© 2024 EduMarket Kenya</p>
  </div>

  <!-- Form panel -->
  <div class="flex items-center justify-center p-6 md:p-12">
    <div class="w-full max-w-md">
      <a href="index.html" class="lg:hidden flex items-center gap-2 font-headline font-bold text-xl text-primary mb-8">
        <span class="material-symbols-outlined">school</span> EduMarket
      </a>

      <div class="flex gap-1 p-1 bg-surface-container-low rounded-full mb-8 w-fit">
        <button id="tab-login" type="button" onclick="setTab('login')" class="px-5 py-2 rounded-full font-label text-label font-semibold text-on-surface">Sign in</button>
        <button id="tab-register" type="button" onclick="setTab('register')" class="px-5 py-2 rounded-full font-label text-label font-semibold text-on-surface-variant">Create account</button>
      </div>

      <div id="msg" class="hidden mb-4 px-4 py-3 rounded-lg text-sm"></div>

      <!-- Login -->
      <form id="login-form" onsubmit="return doLogin(event)" class="space-y-4">
        <div>
          <label class="block font-label text-label font-semibold uppercase tracking-wide text-on-surface-variant mb-1">Email</label>
          <input name="email" type="email" required class="field w-full px-4 py-3 font-body" placeholder="you@school.ac.ke"/>
        </div>
        <div>
          <label class="block font-label text-label font-semibold uppercase tracking-wide text-on-surface-variant mb-1">Password</label>
          <input name="password" type="password" required class="field w-full px-4 py-3 font-body" placeholder="••••••••"/>
        </div>
        <button type="submit" class="w-full bg-primary text-on-primary px-6 py-3 rounded-lg font-label text-label font-semibold hover:opacity-95 active:scale-95 transition">Sign in</button>
        <p class="text-center text-sm text-on-surface-variant">New here? <a href="#" onclick="setTab('register');return false;" class="text-primary font-semibold">Create an account</a></p>
      </form>

      <!-- Register -->
      <form id="register-form" onsubmit="return doRegister(event)" class="space-y-4 hidden">
        <div>
          <label class="block font-label text-label font-semibold uppercase tracking-wide text-on-surface-variant mb-1">Full name</label>
          <input name="name" type="text" required class="field w-full px-4 py-3 font-body" placeholder="Jane Wanjiru"/>
        </div>
        <div>
          <label class="block font-label text-label font-semibold uppercase tracking-wide text-on-surface-variant mb-1">Email</label>
          <input name="email" type="email" required class="field w-full px-4 py-3 font-body" placeholder="you@school.ac.ke"/>
        </div>
        <div>
          <label class="block font-label text-label font-semibold uppercase tracking-wide text-on-surface-variant mb-1">Password</label>
          <input name="password" type="password" required minlength="6" class="field w-full px-4 py-3 font-body" placeholder="At least 6 characters"/>
        </div>
        <div>
          <label class="block font-label text-label font-semibold uppercase tracking-wide text-on-surface-variant mb-1">I am a…</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="flex items-center gap-2 border border-outline-variant rounded-lg px-4 py-3 cursor-pointer">
              <input type="radio" name="role" value="teacher" class="accent-primary" checked/> <span class="font-body">Teacher</span>
            </label>
            <label class="flex items-center gap-2 border border-outline-variant rounded-lg px-4 py-3 cursor-pointer">
              <input type="radio" name="role" value="school" class="accent-primary"/> <span class="font-body">School</span>
            </label>
          </div>
        </div>
        <button type="submit" class="w-full bg-primary text-on-primary px-6 py-3 rounded-lg font-label text-label font-semibold hover:opacity-95 active:scale-95 transition">Create account</button>
        <p class="text-center text-sm text-on-surface-variant">Already have an account? <a href="#" onclick="setTab('login');return false;" class="text-primary font-semibold">Sign in</a></p>
      </form>

      
    </div>
  </div>
</div>

<script>
function setTab(t){
  const login = t === 'login';
  document.getElementById('login-form').classList.toggle('hidden', !login);
  document.getElementById('register-form').classList.toggle('hidden', login);
  document.getElementById('tab-login').className = "px-5 py-2 rounded-full font-label text-label font-semibold " + (login ? "bg-primary text-on-primary" : "text-on-surface-variant");
  document.getElementById('tab-register').className = "px-5 py-2 rounded-full font-label text-label font-semibold " + (login ? "text-on-surface-variant" : "bg-primary text-on-primary");
  hideMsg();
}
function showMsg(text, ok){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = "mb-4 px-4 py-3 rounded-lg text-sm " + (ok ? "bg-success/10 text-success" : "bg-error/10 text-error");
}
function hideMsg(){ document.getElementById('msg').className = 'hidden'; }

async function doLogin(e){
  e.preventDefault();
  const f = e.target;
  const res = await fetch('/api/auth/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email:f.email.value, password:f.password.value})
  });
  const data = await res.json();
  if(!res.ok){ showMsg(data.error || 'Login failed', false); return false; }
  showMsg('Welcome back, '+data.user.name, true);
  setTimeout(()=> location.href = data.user.role === 'teacher' ? 'teacher-dashboard.html' : 'post-hiring-request.html', 600);
  return false;
}
async function doRegister(e){
  e.preventDefault();
  const f = e.target;
  const res = await fetch('/api/auth/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name:f.name.value, email:f.email.value, password:f.password.value, role:f.role.value})
  });
  const data = await res.json();
  if(!res.ok){ showMsg(data.error || 'Registration failed', false); return false; }
  showMsg('Account created for '+data.user.name, true);
  setTimeout(()=> location.href = data.user.role === 'teacher' ? 'teacher-dashboard.html' : 'post-hiring-request.html', 600);
  return false;
}
setTab('login');
</script>
<script>fetch("/api/auth/me",{credentials:"same-origin"}).then(r=>r.ok?r.json():null).then(d=>{if(d&&d.user){location.href=d.user.role==="teacher"?"teacher-dashboard.html":"post-hiring-request.html";}}).catch(()=>{});</script>
</body>
</html>
